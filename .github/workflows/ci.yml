name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r backend/requirements.txt
      - run: python -m compileall backend
      - run: python -m pytest backend/tests
      - run: bash -n scripts/linux/bootstrap-server.sh scripts/linux/install-worker.sh scripts/linux/healthcheck-worker.sh scripts/linux/restart-worker.sh scripts/linux/logs-worker.sh

  scripts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $scripts = @(
            "scripts/check-deploy-ready.ps1",
            "scripts/deploy-linux.ps1",
            "scripts/deploy-vercel.ps1",
            "scripts/run-frontend.ps1",
            "scripts/run-once.ps1",
            "scripts/run-worker.ps1",
            "scripts/smoke-vercel.ps1",
            "scripts/verify-local.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $script), [ref]$tokens, [ref]$errors)
            if ($errors -and $errors.Count) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
            Write-Host "$script syntax ok"
          }
      - name: Validate Linux deploy dry-run
        shell: pwsh
        run: |
          $deployDryRun = powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/deploy-linux.ps1 -HostName "dry-run@example" -DryRun 2>&1
          if ($LASTEXITCODE -ne 0) {
            throw "deploy-linux dry-run failed"
          }
          $deployScript = ($deployDryRun -join "`n")
          $requiredDeployFragments = @(
            "git clone",
            "git pull --ff-only origin main",
            "bash scripts/linux/install-worker.sh",
            "bash scripts/linux/healthcheck-worker.sh"
          )
          foreach ($fragment in $requiredDeployFragments) {
            if ($deployScript -notlike "*$fragment*") {
              throw "deploy-linux dry-run is missing: $fragment"
            }
          }
          if ($deployScript -match "(?m)^\s*exit\s+0\s*$") {
            throw "deploy-linux dry-run contains an unconditional exit 0 that can stop deployment early"
          }
          Write-Host "deploy-linux dry-run ok"
