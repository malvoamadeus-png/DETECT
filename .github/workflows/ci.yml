name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_REF}"
          git checkout --force --detach FETCH_HEAD
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend install
        working-directory: frontend
        run: npm ci
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Frontend API error checks
        working-directory: frontend
        run: npm run check:api-errors
      - name: Frontend API limit checks
        working-directory: frontend
        run: npm run check:limits
      - name: Frontend server DB checks
        working-directory: frontend
        run: npm run check:server-db
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_REF}"
          git checkout --force --detach FETCH_HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r backend/requirements.txt
      - run: python -m compileall backend
      - run: python -m pytest backend/tests
      - shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/check-migrations.ps1
      - shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/check-secrets.ps1
      - run: bash -n scripts/linux/bootstrap-server.sh scripts/linux/install-worker.sh scripts/linux/healthcheck-worker.sh scripts/linux/restart-worker.sh scripts/linux/logs-worker.sh scripts/linux/preflight-worker.sh

  scripts:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_REF}"
          git checkout --force --detach FETCH_HEAD
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $scripts = @(
            "scripts/check-deploy-ready.ps1",
            "scripts/check-migrations.ps1",
            "scripts/check-secrets.ps1",
            "scripts/check-vercel-env.ps1",
            "scripts/deploy-full.ps1",
            "scripts/deploy-linux.ps1",
            "scripts/deploy-vercel.ps1",
            "scripts/run-frontend.ps1",
            "scripts/run-once.ps1",
            "scripts/run-worker.ps1",
            "scripts/smoke-vercel.ps1",
            "scripts/trigger-ci.ps1",
            "scripts/verify-local.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $script), [ref]$tokens, [ref]$errors)
            if ($errors -and $errors.Count) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
            Write-Host "$script syntax ok"
          }
      - name: Validate Linux deploy dry-run
        shell: pwsh
        run: |
          $deployDryRun = powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/deploy-linux.ps1 -HostName "dry-run@example" -DryRun 2>&1
          if ($LASTEXITCODE -ne 0) {
            throw "deploy-linux dry-run failed"
          }
          $deployScript = ($deployDryRun -join "`n")
          $requiredDeployFragments = @(
            "git clone",
            "git pull --ff-only origin main",
            "python3 -m venv --help",
            "python3 -m pip --version",
            "bash scripts/linux/install-worker.sh",
            "bash scripts/linux/healthcheck-worker.sh"
          )
          foreach ($fragment in $requiredDeployFragments) {
            if ($deployScript -notlike "*$fragment*") {
              throw "deploy-linux dry-run is missing: $fragment"
            }
          }
          if ($deployScript -match "(?m)^\s*exit\s+0\s*$") {
            throw "deploy-linux dry-run contains an unconditional exit 0 that can stop deployment early"
          }
          Write-Host "deploy-linux dry-run ok"
      - name: Validate Vercel env template
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/check-vercel-env.ps1 -EnvPath frontend/.env.production.example -AllowPlaceholders
      - name: Validate worker env template
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath ".env.example")) {
            throw "Missing .env.example"
          }
          $envExample = Get-Content -Raw -LiteralPath ".env.example"
          $requiredEnvKeys = @(
            "OPENAI_API_KEY",
            "OPENAI_BASE_URL",
            "OPENAI_MODEL",
            "SUPABASE_DB_URL",
            "DETECT_POLL_SECONDS",
            "DETECT_TARGET_TWEETS",
            "DETECT_MAX_X_PAGES"
          )
          foreach ($key in $requiredEnvKeys) {
            if ($envExample -notmatch "(?m)^\s*$key=") {
              throw ".env.example is missing $key"
            }
          }
          Write-Host ".env.example ok"
